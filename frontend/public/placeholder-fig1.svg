<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#1a1a2e"/>
  <rect x="50" y="80" width="700" height="440" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Boxes -->
  <rect x="80" y="120" width="140" height="80" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="150" y="165" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="11">Data Sources</text>
  <defs>
    <marker id="arrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4fc3f7"/>
    </marker>
  </defs>
  <line x1="220" y1="160" x2="290" y2="160" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <rect x="290" y="120" width="140" height="80" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="360" y="165" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="11">Ingestion Pipeline</text>
  <line x1="430" y1="160" x2="500" y2="160" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <rect x="500" y="120" width="140" height="80" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="570" y="165" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="11">Search Index</text>
  <!-- Lower section -->
  <rect x="290" y="280" width="220" height="80" rx="6" fill="#0d0d14" stroke="#2e9bcf" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="325" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="11">Query Processor</text>
  <line x1="570" y1="200" x2="570" y2="240" stroke="#2e9bcf" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="510" y1="240" x2="570" y2="240" stroke="#2e9bcf" stroke-width="1"/>
  <line x1="510" y1="240" x2="510" y2="280" stroke="#2e9bcf" stroke-width="1" marker-end="url(#arrow1)"/>
  <!-- Result -->
  <rect x="500" y="400" width="140" height="70" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="570" y="440" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="11">Ranked Results</text>
  <line x1="510" y1="360" x2="570" y2="400" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arrow1)"/>
  <!-- Label -->
  <text x="400" y="500" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">FIG. 1 - Architecture Diagram</text>
</svg>
