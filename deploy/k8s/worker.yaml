apiVersion: apps/v1
kind: Deployment
metadata:
  name: patent-worker
  namespace: patent-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patent-worker
  template:
    metadata:
      labels:
        app: patent-worker
    spec:
      containers:
        - name: worker
          image: patent-platform/worker:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: patent-secrets
                  key: database-url
            - name: REDIS_HOST
              value: "redis:6379"
            - name: ELASTICSEARCH_HOST
              value: "http://elasticsearch:9200"
            - name: WEAVIATE_HOST
              value: "weaviate:8080"
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patent-secrets
                  key: neo4j-password
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: patent-worker
  namespace: patent-platform
spec:
  selector:
    app: patent-worker
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
