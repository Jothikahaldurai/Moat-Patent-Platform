apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patent-platform-ingress
  namespace: patent-platform
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - patent-platform.example.com
        - api.patent-platform.example.com
      secretName: patent-platform-tls
  rules:
    - host: patent-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: patent-frontend
                port:
                  number: 80
    - host: api.patent-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: patent-backend
                port:
                  number: 8000
