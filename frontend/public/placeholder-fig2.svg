<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#1a1a2e"/>
  <rect x="50" y="50" width="700" height="500" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Pipeline stages -->
  <rect x="70" y="120" width="120" height="60" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="130" y="155" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="10">Extract</text>
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4fc3f7"/>
    </marker>
  </defs>
  <line x1="190" y1="150" x2="230" y2="150" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <rect x="230" y="120" width="120" height="60" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="290" y="148" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="10">Transform</text>
  <text x="290" y="163" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="8">(Normalize)</text>
  <line x1="350" y1="150" x2="390" y2="150" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <rect x="390" y="120" width="120" height="60" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="450" y="148" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="10">Validate</text>
  <text x="450" y="163" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="8">(Schema Check)</text>
  <line x1="510" y1="150" x2="550" y2="150" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <rect x="550" y="120" width="120" height="60" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="610" y="148" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="10">Index</text>
  <text x="610" y="163" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="8">(Store)</text>
  <!-- Data sources at top -->
  <rect x="130" y="50" width="100" height="30" rx="4" fill="#0d0d14" stroke="#2e9bcf" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="180" y="69" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="8">Cloud DB</text>
  <rect x="350" y="50" width="100" height="30" rx="4" fill="#0d0d14" stroke="#2e9bcf" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="69" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="8">On-Prem DB</text>
  <rect x="570" y="50" width="100" height="30" rx="4" fill="#0d0d14" stroke="#2e9bcf" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="620" y="69" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="8">Streaming</text>
  <line x1="180" y1="80" x2="130" y2="120" stroke="#2e9bcf" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="400" y1="80" x2="290" y2="120" stroke="#2e9bcf" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="620" y1="80" x2="610" y2="120" stroke="#2e9bcf" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Common Schema layer -->
  <rect x="100" y="250" width="600" height="50" rx="6" fill="#0d0d14" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="400" y="280" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="11">Common Schema Layer</text>
  <!-- Data quality metrics below -->
  <rect x="100" y="350" width="180" height="60" rx="6" fill="#0d0d14" stroke="#2e9bcf" stroke-width="1"/>
  <text x="190" y="380" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="9">Records Processed</text>
  <text x="190" y="396" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="14">1,247</text>
  <rect x="310" y="350" width="180" height="60" rx="6" fill="#0d0d14" stroke="#2e9bcf" stroke-width="1"/>
  <text x="400" y="380" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="9">Error Rate</text>
  <text x="400" y="396" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="14">0.03%</text>
  <rect x="520" y="350" width="180" height="60" rx="6" fill="#0d0d14" stroke="#2e9bcf" stroke-width="1"/>
  <text x="610" y="380" text-anchor="middle" fill="#2e9bcf" font-family="monospace" font-size="9">Throughput</text>
  <text x="610" y="396" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="14">850/s</text>
  <!-- Label -->
  <text x="400" y="470" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">FIG. 2 - Data Ingestion Pipeline</text>
</svg>
