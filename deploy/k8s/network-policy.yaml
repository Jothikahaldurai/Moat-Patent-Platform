apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: patent-platform-policy
  namespace: patent-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: patent-backend
        - podSelector:
            matchLabels:
              app: patent-worker
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 9200
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 7687
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
